[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"

# @astrojs/sitemap emits a sitemap index + sitemap-0.xml (the flat list of all
# URLs). Serve the flat list at the conventional /sitemap.xml so it directly
# shows every page (the index only lists the sub-sitemap, which looks empty).
[[redirects]]
  from = "/sitemap.xml"
  to = "/sitemap-0.xml"
  status = 200

# Astro emits clean directory-style URLs with trailing slashes.
[[headers]]
  for = "/_astro/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/og/*"
  [headers.values]
    Cache-Control = "public, max-age=604800"
